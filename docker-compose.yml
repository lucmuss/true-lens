services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: app.settings
      PYTHONPATH: /app/src
    command: ["/app/scripts/bootstrap.sh", "run"]
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz/', timeout=5).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
    networks:
      - true-lens
      - apps-shared

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "${APP_HOST_PORT:-18087}:8087"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./media:/app/media:ro
      - ./staticfiles:/app/staticfiles:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8087/healthz/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s
    networks:
      - true-lens

  db:
    image: postgres:16-alpine
    profiles: ["localdb"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-true_lens}
      POSTGRES_USER: ${POSTGRES_USER:-true_lens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-true_lens}
    ports:
      - "${POSTGRES_HOST_PORT:-5439}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-true_lens} -d ${POSTGRES_DB:-true_lens}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - true-lens

volumes:
  postgres_data:

networks:
  true-lens:
    driver: bridge
  apps-shared:
    external: true
    name: apps-shared
