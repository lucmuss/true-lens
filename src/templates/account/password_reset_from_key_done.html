{% extends "base.html" %}
{% load i18n %}
{% block title %}Passwort geändert · {{ PROJECT_NAME }}{% endblock %}
{% block body %}
<div class="ow-auth-wrap">
  <div class="max-w-md w-full">
    <div class="panel p-8 text-center">
      <div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
        </svg>
      </div>
      <h1 class="text-xl font-bold text-slate-900 mb-2">Passwort geändert</h1>
      <p class="text-slate-500 text-sm mb-6">Dein Passwort wurde erfolgreich aktualisiert. Du kannst dich jetzt anmelden.</p>
      <a href="{% url 'account_login' %}" class="btn-primary inline-block px-6">Jetzt anmelden</a>
    </div>
  </div>
</div>
{% endblock %}
