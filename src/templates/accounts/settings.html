{% extends "base.html" %}
{% block title %}Recruiter Einstellungen{% endblock %}
{% block body %}
<div class="max-w-3xl mx-auto p-6">
  <div class="panel p-6">
    <h1 class="text-xl font-semibold">Benachrichtigungseinstellungen</h1>
    <form method="post" class="mt-6 space-y-4">
      {% csrf_token %}
      <label class="flex items-center gap-2"><input type="checkbox" name="notify_on_vote_overlap" {% if user.notify_on_vote_overlap %}checked{% endif %}> Bei gleichen Kandidatenbewertungen benachrichtigen</label>
      <label class="flex items-center gap-2"><input type="checkbox" name="notify_on_contact_requests" {% if user.notify_on_contact_requests %}checked{% endif %}> Bei Kontaktanfragen benachrichtigen</label>
      <label class="flex items-center gap-2"><input type="checkbox" name="notify_on_security" {% if user.notify_on_security %}checked{% endif %}> Sicherheitsmails bei Login senden</label>
      <button class="btn-primary">Speichern</button>
    </form>

    <div class="mt-8 border-t pt-6">
      <a href="{% url 'recruiter_delete' %}" class="text-red-700 font-semibold">Recruiter Profil loeschen</a>
    </div>
  </div>
</div>
{% endblock %}
